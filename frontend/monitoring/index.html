<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI训练智能体 - 监控大屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0f1419;
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(90deg, #1a1f2e 0%, #252b3d 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #00d4aa 0%, #00a8e8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-online {
            background: rgba(0, 212, 170, 0.2);
            color: #00d4aa;
        }
        
        .container {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #1a1f2e 0%, #252b3d 100%);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2d3748;
            transition: transform 0.2s;
        }
        
        .metric-card:hover {
            transform: translateY(-4px);
            border-color: #3d4758;
        }
        
        .metric-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .metric-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .icon-blue { background: rgba(0, 168, 232, 0.2); }
        .icon-green { background: rgba(0, 212, 170, 0.2); }
        .icon-orange { background: rgba(255, 170, 0, 0.2); }
        .icon-red { background: rgba(255, 90, 90, 0.2); }
        .icon-purple { background: rgba(168, 85, 247, 0.2); }
        
        .metric-title {
            font-size: 14px;
            color: #8b9cb5;
        }
        
        .metric-value {
            font-size: 36px;
            font-weight: 700;
            margin-top: 8px;
        }
        
        .metric-value.blue { color: #00a8e8; }
        .metric-value.green { color: #00d4aa; }
        .metric-value.orange { color: #ffaa00; }
        .metric-value.red { color: #ff5a5a; }
        .metric-value.purple { color: #a855f7; }
        
        .metric-change {
            font-size: 13px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .change-up { color: #00d4aa; }
        .change-down { color: #ff5a5a; }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 30px 0 20px;
            color: #e2e8f0;
        }
        
        .chart-container {
            background: linear-gradient(135deg, #1a1f2e 0%, #252b3d 100%);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2d3748;
            margin-bottom: 20px;
        }
        
        .chart-title {
            font-size: 16px;
            color: #8b9cb5;
            margin-bottom: 16px;
        }
        
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 150px;
            padding-top: 20px;
        }
        
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            transition: all 0.3s;
            position: relative;
        }
        
        .bar:hover {
            opacity: 0.8;
        }
        
        .bar-label {
            font-size: 11px;
            color: #5a6a7d;
        }
        
        .log-container {
            background: #0d1117;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #1f2937;
            display: flex;
            gap: 12px;
        }
        
        .log-time {
            color: #5a6a7d;
            flex-shrink: 0;
        }
        
        .log-info { color: #00a8e8; }
        .log-success { color: #00d4aa; }
        .log-warning { color: #ffaa00; }
        .log-error { color: #ff5a5a; }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4aa 0%, #00a8e8 100%);
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 212, 170, 0.3);
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.1);
        }
        
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .alert-banner {
            background: linear-gradient(90deg, rgba(255, 90, 90, 0.2) 0%, rgba(255, 170, 0, 0.2) 100%);
            border: 1px solid rgba(255, 90, 90, 0.3);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: none;
        }
        
        .alert-banner.show {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .alert-icon {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 AI训练智能体 - 实时监控</h1>
        <span class="status-badge status-online">● 系统运行中</span>
    </div>
    
    <div class="container">
        <!-- 告警横幅 -->
        <div id="alertBanner" class="alert-banner">
            <span class="alert-icon">⚠️</span>
            <div>
                <div style="font-weight: 600; color: #ff5a5a;">系统告警</div>
                <div id="alertMessage" style="color: #ffaa00; font-size: 14px;">内存使用率超过80%</div>
            </div>
        </div>
        
        <!-- 核心指标 -->
        <div class="section-title">核心指标</div>
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-icon icon-blue">🧠</div>
                    <div class="metric-title">系统内存使用</div>
                </div>
                <div id="memoryValue" class="metric-value blue">--%</div>
                <div class="metric-change">
                    <span id="memoryTrend">加载中...</span>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-icon icon-green">⚡</div>
                    <div class="metric-title">CPU 使用率</div>
                </div>
                <div id="cpuValue" class="metric-value green">--%</div>
                <div class="metric-change">
                    <span id="cpuTrend">加载中...</span>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-icon icon-purple">🤖</div>
                    <div class="metric-title">加载模型数</div>
                </div>
                <div id="modelsValue" class="metric-value purple">--</div>
                <div class="metric-change">
                    <span style="color: #8b9cb5;">内存中的模型</span>
                </div>
            </div>
            
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-icon icon-orange">📊</div>
                    <div class="metric-title">预测总次数</div>
                </div>
                <div id="predictionsValue" class="metric-value orange">--</div>
                <div class="metric-change change-up">
                    <span>↑ 实时累计</span>
                </div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="section-title">预测延迟分布 (近1小时)</div>
        <div class="chart-container">
            <div class="chart-title">响应时间分布 (毫秒)</div>
            <div id="latencyChart" class="bar-chart">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 系统日志 -->
        <div class="section-title">实时日志</div>
        <div class="chart-container">
            <div id="logContainer" class="log-container">
                <div class="log-entry">
                    <span class="log-time">--:--:--</span>
                    <span class="log-info">系统初始化完成，等待数据...</span>
                </div>
            </div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">↻</button>
    
    <script>
        const API_BASE = window.location.origin + '/ai-training';
        
        // 存储历史数据
        let historyData = {
            memory: [],
            cpu: [],
            timestamps: []
        };
        
        // 解析Prometheus格式数据
        function parsePrometheusMetrics(text) {
            const metrics = {};
            const lines = text.split('\n');
            
            for (const line of lines) {
                if (line.startsWith('#') || !line.trim()) continue;
                
                const match = line.match(/^([^{]+)(?:{([^}]+)})?\s+(.+)$/);
                if (match) {
                    const name = match[1];
                    const labels = match[2];
                    const value = parseFloat(match[3]);
                    
                    if (!metrics[name]) {
                        metrics[name] = [];
                    }
                    metrics[name].push({ labels, value });
                }
            }
            
            return metrics;
        }
        
        // 获取指标值
        function getMetricValue(metrics, name, defaultValue = 0) {
            if (metrics[name] && metrics[name].length > 0) {
                return metrics[name][0].value;
            }
            return defaultValue;
        }
        
        // 刷新数据
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const health = await response.json();
                
                // 获取Prometheus指标
                const metricsResponse = await fetch(window.location.origin + '/metrics');
                const metricsText = await metricsResponse.text();
                const metrics = parsePrometheusMetrics(metricsText);
                
                // 更新内存
                const memory = getMetricValue(metrics, 'ai_system_memory_percent');
                document.getElementById('memoryValue').textContent = memory.toFixed(1) + '%';
                
                // 内存颜色预警
                const memEl = document.getElementById('memoryValue');
                if (memory > 80) {
                    memEl.className = 'metric-value red';
                    showAlert('内存使用率超过80%，建议清理模型释放内存');
                } else if (memory > 60) {
                    memEl.className = 'metric-value orange';
                    hideAlert();
                } else {
                    memEl.className = 'metric-value blue';
                    hideAlert();
                }
                
                document.getElementById('memoryTrend').textContent = 
                    memory > 70 ? '建议关注' : '运行正常';
                
                // 更新CPU
                const cpu = getMetricValue(metrics, 'ai_system_cpu_percent');
                document.getElementById('cpuValue').textContent = cpu.toFixed(1) + '%';
                document.getElementById('cpuTrend').textContent = 
                    cpu > 80 ? '负载较高' : '运行平稳';
                
                // 更新模型数
                const models = getMetricValue(metrics, 'ai_loaded_models_count');
                document.getElementById('modelsValue').textContent = models;
                
                // 更新预测次数
                const predictions = getMetricValue(metrics, 'ai_prediction_total');
                document.getElementById('predictionsValue').textContent = predictions;
                
                // 存储历史
                historyData.memory.push(memory);
                historyData.cpu.push(cpu);
                historyData.timestamps.push(new Date().toLocaleTimeString());
                
                if (historyData.memory.length > 20) {
                    historyData.memory.shift();
                    historyData.cpu.shift();
                    historyData.timestamps.shift();
                }
                
                // 添加日志
                addLog('数据更新成功', 'success');
                
            } catch (error) {
                addLog('获取数据失败: ' + error.message, 'error');
            }
            
            btn.classList.remove('spinning');
        }
        
        // 显示告警
        function showAlert(message) {
            const banner = document.getElementById('alertBanner');
            document.getElementById('alertMessage').textContent = message;
            banner.classList.add('show');
        }
        
        // 隐藏告警
        function hideAlert() {
            document.getElementById('alertBanner').classList.remove('show');
        }
        
        // 添加日志
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-${type}">${message}</span>
            `;
            
            container.insertBefore(entry, container.firstChild);
            
            // 保持最多20条
            while (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }
        
        // 生成延迟图表（模拟数据）
        function generateLatencyChart() {
            const chart = document.getElementById('latencyChart');
            chart.innerHTML = '';
            
            const buckets = ['<10ms', '10-50ms', '50-100ms', '100-250ms', '250-500ms', '>500ms'];
            const colors = ['#00d4aa', '#00d4aa', '#00a8e8', '#00a8e8', '#ffaa00', '#ff5a5a'];
            const heights = [60, 85, 45, 20, 8, 2];  // 百分比
            
            buckets.forEach((label, i) => {
                const item = document.createElement('div');
                item.className = 'bar-item';
                item.innerHTML = `
                    <div class="bar" style="height: ${heights[i] * 1.5}px; background: ${colors[i]};"></div>
                    <span class="bar-label">${label}</span>
                `;
                chart.appendChild(item);
            });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            generateLatencyChart();
            
            // 每5秒自动刷新
            setInterval(refreshData, 5000);
            
            addLog('监控面板已启动', 'info');
        });
    </script>
</body>
</html>
