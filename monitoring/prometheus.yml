# Prometheus 配置 - AI训练平台监控
global:
  scrape_interval: 15s      # 抓取间隔
  evaluation_interval: 15s  # 告警规则评估间隔
  external_labels:
    cluster: 'ai-training'
    replica: '{{.ExternalURL}}'

# 告警规则文件
rule_files:
  - "alerts.yml"

# 抓取目标
scrape_configs:
  # AI训练平台 API
  - job_name: 'ai-training-api'
    static_configs:
      - targets: ['localhost:8004']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # 系统监控（Node Exporter）
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 15s

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# 存储配置
storage:
  tsdb:
    retention.time: 7d      # 保留7天数据
    retention.size: 10GB    # 最大10GB
